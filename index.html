<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Outils & Visualisations</title>
    <!-- Tailwind CSS pour un rendu propre et rapide -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome pour les icônes utilitaires -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col font-sans">

    <!-- En-tête sobre -->
    <header class="bg-white border-b border-slate-200">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <i class="fa-solid fa-wrench text-slate-600"></i>
                <span class="font-bold text-slate-900 tracking-tight">Mes Outils de Conception</span>
            </div>
            
            <a href="https://github.com" id="github-link" target="_blank" class="flex items-center space-x-1.5 text-xs text-slate-500 hover:text-slate-900 transition-colors">
                <i class="fa-brands fa-github text-sm"></i>
                <span>Voir le dépôt</span>
            </a>
        </div>
    </header>

    <!-- Zone de contenu -->
    <main class="flex-grow max-w-6xl w-full mx-auto px-4 py-6">
        
        <!-- En-tête de section simple -->
        <div class="mb-6">
            <h1 class="text-xl font-bold text-slate-900">Index des projets et visualisations</h1>
            <p class="text-xs text-slate-500 mt-1">Accès rapide à mes scripts statiques et outils d'aide à la conception.</p>
        </div>

        <!-- Outils de recherche et de tri -->
        <div class="mb-6 flex flex-col sm:flex-row gap-3">
            <!-- Recherche rapide -->
            <div class="relative flex-grow">
                <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                    <i class="fa-solid fa-magnifying-glass text-xs"></i>
                </span>
                <input type="text" id="search-input" placeholder="Rechercher un outil, une techno ou un cours..." class="w-full pl-9 pr-3 py-2 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm transition-all">
            </div>

            <!-- Filtre par catégorie -->
            <div class="sm:w-64">
                <select id="category-filter" class="w-full px-3 py-2 bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm cursor-pointer transition-all">
                    <option value="all">Toutes les catégories</option>
                    <!-- Les options de catégories seront injectées ici -->
                </select>
            </div>
        </div>

        <!-- Grille des projets (style épuré) -->
        <div id="projects-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Généré par JavaScript -->
        </div>

        <!-- Message d'absence de résultat -->
        <div id="empty-state" class="hidden text-center py-12 border border-dashed border-slate-300 rounded-lg bg-white">
            <i class="fa-solid fa-folder-open text-slate-300 text-3xl mb-2"></i>
            <h3 class="text-sm font-semibold text-slate-700">Aucun outil trouvé</h3>
            <p class="text-xs text-slate-400 mt-1">Ajustez vos termes de recherche.</p>
        </div>

    </main>

    <!-- Pied de page discret -->
    <footer class="py-6 border-t border-slate-200 bg-white text-center text-xs text-slate-400">
        <div class="max-w-6xl mx-auto px-4">
            <span>Hub personnel • Mis à jour dynamiquement</span>
        </div>
    </footer>

    <!-- SCRIPT DE CONFIGURATION ET DE RECHERCHE -->
    <script>
        /************************************************************************
         * CONFIGURATION DES PROJETS
         * Ajoutez ou modifiez vos sites ici.
         ************************************************************************/
        const projects = [
            {
                title: "Optical Detection",
                category: "MICRO-315 Epuck",
                description: "Projet de détection optique réalisé dans le cadre du cours de robotique MICRO-315 avec le robot e-puck.",
                path: "./MICRO-315_epuck-project/optical-detection/index.html",
                icon: "fa-solid fa-eye",
                tags: ["Robotique", "Vision", "EPFL"],
                date: "Mai 2026"
            }
        ];

        // Remplir dynamiquement le lien du dépôt selon l'adresse courante
        const updateGithubLink = () => {
            const host = window.location.hostname;
            const path = window.location.pathname.split('/')[1];
            const githubLink = document.getElementById('github-link');
            
            if (host.includes('github.io')) {
                const user = host.split('.')[0];
                githubLink.href = `https://github.com/${user}/${path}`;
            }
        };

        // Rendu épuré des cartes
        const renderProjects = (filteredProjects) => {
            const grid = document.getElementById('projects-grid');
            const emptyState = document.getElementById('empty-state');
            grid.innerHTML = '';

            if (filteredProjects.length === 0) {
                emptyState.classList.remove('hidden');
                grid.classList.add('hidden');
                return;
            }

            emptyState.classList.add('hidden');
            grid.classList.remove('hidden');

            filteredProjects.forEach(project => {
                const card = document.createElement('div');
                // Style plus direct, sobre et propre
                card.className = "flex flex-col justify-between p-5 bg-white border border-slate-200 rounded-lg hover:border-blue-500 hover:shadow-sm transition-all duration-150";
                
                const tagsHtml = project.tags.map(tag => 
                    `<span class="text-[10px] font-medium px-2 py-0.5 rounded bg-slate-100 text-slate-600">${tag}</span>`
                ).join(' ');

                card.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <span class="text-[10px] font-bold text-slate-400 tracking-wider uppercase">${project.category}</span>
                            <span class="text-[10px] text-slate-400">${project.date}</span>
                        </div>
                        
                        <div class="flex items-center space-x-2.5 mb-2">
                            <div class="text-slate-500 text-base">
                                <i class="${project.icon || 'fa-solid fa-code'}"></i>
                            </div>
                            <h3 class="text-sm font-bold text-slate-950">
                                ${project.title}
                            </h3>
                        </div>

                        <p class="text-xs text-slate-500 line-clamp-2 mb-4">
                            ${project.description}
                        </p>
                    </div>

                    <div>
                        <div class="flex flex-wrap gap-1 mb-4">
                            ${tagsHtml}
                        </div>
                        <a href="${project.path}" class="w-full inline-flex items-center justify-center space-x-1.5 px-3 py-1.5 bg-slate-100 hover:bg-blue-600 text-slate-700 hover:text-white font-medium text-xs rounded transition-colors duration-100">
                            <span>Ouvrir l'outil</span>
                            <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                        </a>
                    </div>
                `;
                grid.appendChild(card);
            });
        };

        // Filtres et recherche
        const initFiltersAndSearch = () => {
            const searchInput = document.getElementById('search-input');
            const categoryFilter = document.getElementById('category-filter');

            // Extraction des catégories
            const categories = [...new Set(projects.map(p => p.category))];
            categories.forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                categoryFilter.appendChild(opt);
            });

            const filterProjects = () => {
                const query = searchInput.value.toLowerCase().trim();
                const selectedCat = categoryFilter.value;

                const filtered = projects.filter(project => {
                    const matchesSearch = 
                        project.title.toLowerCase().includes(query) ||
                        project.description.toLowerCase().includes(query) ||
                        project.tags.some(tag => tag.toLowerCase().includes(query));
                    
                    const matchesCategory = selectedCat === 'all' || project.category === selectedCat;

                    return matchesSearch && matchesCategory;
                });

                renderProjects(filtered);
            };

            searchInput.addEventListener('input', filterProjects);
            categoryFilter.addEventListener('change', filterProjects);
        };

        // Chargement initial
        window.addEventListener('DOMContentLoaded', () => {
            updateGithubLink();
            initFiltersAndSearch();
            renderProjects(projects);
        });
    </script>
</body>
</html>
